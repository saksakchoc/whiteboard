services:
  whiteboard:
    build: .
    container_name: whiteboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      # Enable direct HTTPS by mounting certs below and setting both paths.
      # SSL_KEY_PATH: /app/certs/privkey.pem
      # SSL_CERT_PATH: /app/certs/fullchain.pem
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./certs:/app/certs:ro
