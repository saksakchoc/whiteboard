<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Whiteboard</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <button id="menu-toggle-btn" class="menu-toggle-btn hidden" aria-label="メニューを表示">></button>
    <div id="side-toolbar">
      <div class="side-stack">
        <button id="pen-tool-btn" class="side-button" title="ペン">✏️</button>
        <div class="side-eraser-tool">
          <button id="eraser-tool-btn" class="side-button" title="消しゴム（通常モード）" aria-haspopup="menu" aria-expanded="false">🩹</button>
          <div id="eraser-tool-menu" class="side-menu hidden" role="menu">
            <button data-eraser-mode="normal" role="menuitem">通常モード</button>
            <button data-eraser-mode="own" role="menuitem">自分の線だけ消す</button>
          </div>
        </div>
        <button id="select-tool-btn" class="side-button" title="選択">🖱️</button>
        <div class="side-lasso-tool">
          <button id="lasso-copy-tool-btn" class="side-button" title="投げ縄スクショ">✂</button>
          <div id="lasso-copy-tool-menu" class="side-menu hidden">
            <button data-lasso-copy-mode="rect">四角形</button>
            <button data-lasso-copy-mode="freehand">フリーハンド</button>
          </div>
        </div>
        <div class="side-text-tool">
          <button id="text-tool-btn" class="side-button" title="文字入力">A</button>
          <div id="text-tool-menu" class="side-menu hidden">
            <button data-text-mode="normal">通常入力</button>
            <button data-text-mode="grid">方眼紙用入力</button>
          </div>
        </div>
        <div class="side-list-tool">
          <button id="list-menu-btn" class="side-button" title="一覧">📝</button>
          <div id="list-menu" class="side-menu hidden">
            <button id="text-list-btn">文字一覧</button>
            <button id="image-list-btn">画像一覧</button>
            <button id="link-list-btn">リンク集</button>
          </div>
        </div>
        <div class="side-insert-tool">
          <button id="insert-menu-btn" class="side-button" title="挿入" aria-label="挿入">
            <span class="insert-tool-icon" aria-hidden="true"></span>
          </button>
          <div id="insert-menu" class="insert-menu hidden"></div>
        </div>
        <div class="side-shared-tools">
          <button id="shared-tools-btn" class="side-button" title="共有ツール" aria-label="共有ツール" aria-expanded="false">🛠️</button>
          <div id="shared-tools-menu" class="side-menu hidden">
            <button id="shared-calculator-btn">🧮 計算機</button>
            <button id="shared-search-btn">🔎 Google検索</button>
            <button id="shared-translate-ja-btn">🇯🇵 和訳（英語 → 日本語）</button>
            <button id="shared-translate-en-btn">🇺🇸 英訳（日本語 → 英語）</button>
            <button id="shared-website-btn">🌐 Webサイト</button>
            <button id="shared-text-memo-btn">📄 テキストメモ</button>
            <button id="shared-riddle-tool-btn">🧩 謎解きツール</button>
            <button id="shared-qr-reader-btn">📷 QRコード読み取り</button>
          </div>
        </div>
        <button id="undo-btn" class="side-button" title="一手戻す">⟲</button>
        <div class="side-others">
          <button id="other-menu-btn" class="side-button" title="その他">⋯</button>
          <div id="other-menu" class="side-menu hidden">
            <button id="fill-tool-btn" title="塗りつぶし">🪣 塗りつぶし</button>
            <div class="side-watch-tool">
              <button id="watch-users-btn" title="メンバー追跡">👀 メンバー追跡</button>
              <div id="watch-users-menu" class="side-menu watch-users-menu hidden"></div>
            </div>
            <button id="drive-menu-btn">画像ドライブ</button>
            <button id="stroke-alpha-toggle-btn">半透明</button>
            <button id="change-user-btn">ユーザー名変更</button>
          </div>
        </div>
      </div>
    </div>
    </div>

    <div id="toolbar" class="top-color-row">
      <span id="board-title" class="board-title" title="クリックしてタイトル変更"></span>
      <div class="top-scroll">
        <div id="color-swatches" class="color-grid">
          <div class="color-item">
            <button class="color-swatch" data-color="#000000" title="黒"></button>
            <button class="color-fav" data-color="#000000" title="お気に入り">☆</button>
          </div>
          <div class="color-item">
            <button class="color-swatch" data-color="#ff00a8" title="ピンク"></button>
            <button class="color-fav" data-color="#ff00a8" title="お気に入り">☆</button>
          </div>
          <div class="color-item">
            <button class="color-swatch" data-color="#FF7A00" title="オレンジ"></button>
            <button class="color-fav" data-color="#FF7A00" title="お気に入り">☆</button>
          </div>
          <div class="color-item">
            <button class="color-swatch" data-color="#77D22D" title="グリーン"></button>
            <button class="color-fav" data-color="#77D22D" title="お気に入り">☆</button>
          </div>
          <div class="color-item">
            <button class="color-swatch" data-color="#00e5ff" title="シアン"></button>
            <button class="color-fav" data-color="#00e5ff" title="お気に入り">☆</button>
          </div>
          <div class="color-item">
            <button class="color-swatch" data-color="#d500f9" title="パープル"></button>
            <button class="color-fav" data-color="#d500f9" title="お気に入り">☆</button>
          </div>
          <div class="color-item">
            <!--薄すぎず濃すぎず、黒にも白にも映える黄色　-->
            <button class="color-swatch" data-color="#FFE600" title="イエロー"></button>
            <button class="color-fav" data-color="#FFE600" title="お気に入り">☆</button>
          </div>
        </div>
        <label>
          🎨
          <input type="color" id="color-picker" value="#000000" />
        </label>
        <label>
          ◉
          <input type="range" id="size-range" min="1" max="15" value="4" />
          <span id="size-label">4</span>
        </label>
      </div>
      <button id="layer-toggle-btn" class="layer-toggle top-layer-btn">レイヤー: 自分</button>
    </div>

    <div id="canvas-container">
      <canvas id="board-canvas"></canvas>
      <div id="spreadsheet-layer" class="spreadsheet-layer"></div>
      <div id="text-memo-layer" class="text-memo-layer"></div>
    </div>
    <div id="screen-share-view" class="screen-share-view hidden" title="クリックで表示切替">
      <div id="screen-share-label" class="screen-share-label"></div>
      <video id="screen-share-video" autoplay playsinline></video>
      <button id="screen-share-toggle-btn" class="screen-share-toggle-btn hidden" type="button">ON</button>
    </div>
    <input id="image-file-input" type="file" accept="image/*" multiple hidden />
    <input id="drive-file-input" type="file" accept="image/*" multiple hidden />
    <div id="footer-hint" class="footer-hint"></div>

    <div id="text-list-panel" class="modal text-list-panel hidden">
      <div class="text-list-header">
        <span>テキスト一覧</span>
        <div class="text-list-actions">
          <button id="text-list-duplicate-grid-btn" disabled>複製</button>
          <button id="text-list-add-to-memo-btn" disabled>メモに追加</button>
          <button id="text-list-copy-plain-btn">Copy</button>
          <button id="text-list-copy-tagged-btn">Copy(タグ付き)</button>
          <button id="text-list-close-btn">閉じる</button>
        </div>
      </div>
      <div class="text-list-controls">
        <span>ドラッグして並び替え</span>
        <button id="text-list-sort-kana-btn" type="button">50音順</button>
        <button id="text-list-sort-tag-btn" type="button">タグ順</button>
        <button id="text-list-sort-created-btn" type="button">作成順</button>
        <label class="text-list-star-filter">
          <input id="text-list-star-only" type="checkbox" />
          ★のみ
        </label>
      </div>
      <div id="text-list-body" class="text-list-body"></div>
    </div>

    <div id="image-list-panel" class="modal text-list-panel image-list-panel hidden">
      <div class="text-list-header">
        <span>画像一覧</span>
        <div class="text-list-actions">
          <button id="image-list-close-btn">閉じる</button>
        </div>
      </div>
      <div id="image-list-body" class="text-list-body image-list-body"></div>
    </div>

    <div id="link-list-panel" class="modal text-list-panel link-list-panel hidden">
      <div class="text-list-header">
        <span>リンク集</span>
        <div class="text-list-actions">
          <button id="link-list-close-btn">閉じる</button>
        </div>
      </div>
      <div id="link-list-body" class="text-list-body link-list-body"></div>
    </div>

    <div id="drive-modal" class="modal-backdrop hidden">
      <section class="modal drive-modal" role="dialog" aria-modal="true" aria-labelledby="drive-title">
        <header class="drive-header">
          <div>
            <h3 id="drive-title">画像ドライブ</h3>
            <nav id="drive-breadcrumb" class="drive-breadcrumb" aria-label="フォルダ階層"></nav>
          </div>
          <button id="drive-close-btn" type="button" aria-label="閉じる">×</button>
        </header>
        <div class="drive-toolbar">
          <button id="drive-new-folder-btn" type="button">＋ 新しいフォルダ</button>
          <button id="drive-upload-btn" type="button">↑ 画像を追加</button>
          <button id="drive-import-board-images-btn" type="button">全画像をドライブに移動</button>
          <button id="drive-select-all-btn" type="button">全件選択</button>
          <label id="drive-sort-control" class="drive-order-control">
            表示順
            <select id="drive-sort-order">
              <option value="upload">アップロード日時</option>
              <option value="name">ファイル名</option>
              <option value="captured">作成日時（撮影日）</option>
            </select>
          </label>
          <label id="drive-order-control" class="drive-order-control hidden">
            貼り付け順
            <select id="drive-selection-order">
              <option value="display">表示順</option>
              <option value="selection">選択順</option>
            </select>
          </label>
          <span id="drive-status" class="drive-status" aria-live="polite"></span>
        </div>
        <div id="drive-grid" class="drive-grid"></div>
      </section>
    </div>

    <div id="drive-slideshow-modal" class="modal-backdrop drive-slideshow-backdrop hidden">
      <section class="drive-slideshow" role="dialog" aria-modal="true" aria-label="画像スライドショー">
        <button id="drive-slideshow-back-btn" class="drive-slideshow-back-btn" type="button">← ドライブに戻る</button>
        <button id="drive-slideshow-place-btn" class="drive-slideshow-place-btn" type="button">ボードに配置</button>
        <div class="drive-slide-stage">
          <button id="drive-slide-prev-btn" class="drive-slide-nav" type="button" aria-label="前の画像">‹</button>
          <img id="drive-slide-image" alt="" />
          <button id="drive-slide-next-btn" class="drive-slide-nav" type="button" aria-label="次の画像">›</button>
        </div>
        <div id="drive-slide-thumbnails" class="drive-slide-thumbnails" aria-label="フォルダ内の画像"></div>
      </section>
    </div>

    <div id="drive-selection-menu" class="context-menu drive-selection-menu hidden">
      <button type="button" data-drive-action="insert">ボードに貼り付け</button>
      <button type="button" data-drive-action="insert-slideshow">スライドショーとして貼り付け</button>
      <button type="button" data-drive-action="download">ダウンロード</button>
      <button type="button" data-drive-action="rename">画像名を変更</button>
      <button type="button" data-drive-action="delete">削除</button>
    </div>

    <div id="drive-folder-menu" class="context-menu drive-selection-menu hidden">
      <button type="button" data-drive-folder-action="insert-slideshow">スライドショーとしてボードに配置</button>
      <button type="button" data-drive-folder-action="rename">フォルダ名を変更</button>
      <button type="button" data-drive-folder-action="delete">フォルダを削除</button>
    </div>

    <div id="user-modal" class="modal-backdrop hidden">
      <div class="modal">
        <h3>ユーザーを選択</h3>
        <label>
          ユーザー名:
          <input list="user-datalist" id="user-name-input" autocomplete="off" />
        </label>
        <datalist id="user-datalist"></datalist>
        <div class="modal-actions">
          <button id="user-join-btn">開始</button>
        </div>
      </div>
    </div>

    <div id="frame-delete-modal" class="modal-backdrop hidden">
      <div class="modal frame-delete-modal">
        <h3>フレームを削除</h3>
        <p>フレーム内のオブジェクトをどうしますか。</p>
        <div class="modal-actions frame-delete-actions">
          <button id="frame-delete-contents-btn">フレームごと削除</button>
          <button id="frame-delete-frame-only-btn">中身を残す</button>
          <button id="frame-delete-cancel-btn">キャンセル</button>
        </div>
      </div>
    </div>

    <div id="context-menu" class="context-menu hidden">
      <button data-action="open-drive">ドライブから画像挿入</button>
      <button data-action="board-attention">📣 みんな見て！</button>
      <button data-action="apply-draft">下書きを通常レイヤーに反映</button>
      <button data-action="move-base">ベースレイヤー（共用）に移動</button>
      <button data-action="move-image">背景レイヤーに移動（Adminのみ）</button>
      <button data-action="move-frame-background">背景タブへ移動</button>
      <button data-action="add-image-tab">タブを追加</button>
      <button data-action="delete-frame-tab">タブを削除</button>
      <button data-action="select-frame-contents">フレーム内を全選択</button>
      <button data-action="rename-image">画像名を設定</button>
      <button data-action="mirror-image">左右反転</button>
      <button data-action="bring-front">最前面に移動</button>
      <button data-action="send-back">最背面に移動</button>
      <button data-action="rotate-right">右に90度回転(Alt+クリック)</button>
      <button data-action="rotate-left">左に90度回転(右Alt+クリック)</button>
      <button data-action="copy-draft">下書きレイヤーにコピー</button>
      <button data-action="convert-to-grid-text">方眼紙テキストに変換</button>
      <button data-action="convert-to-normal-text">通常テキストに変換</button>
      <button data-action="lasso-copy">コピー</button>
      <button data-action="lasso-link-board">別窓で開く</button>
      <button data-action="lasso-draft-board">下書きボード作成</button>
      <button data-action="publish-draft-board">みんなに公開</button>
      <button data-action="open-spreadsheet-window">別窓で表示</button>
      <button data-action="open-spreadsheet-source">元のページで開く</button>
      <button data-action="duplicate">複製</button>
      <button data-action="delete">削除</button>
    </div>

    <script src="../socket.io/socket.io.js"></script>
    <script src="../vendor/jsQR.js"></script>
    <script src="../board.js"></script>
  </body>
</html>
